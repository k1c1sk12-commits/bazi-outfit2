<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>八字 × 衣著增運系統</title>
  <style>
    :root {
      --bg: #F7F4EF;
      --line: #E7DED2;
      --text: #3E3A36;
      --muted: #7A746D;
      --accent: #C6A77D;
      --accent-2: #E8D6BF;
      --good: #6B705C;
      --warn: #B48A5A;
      --shadow: 0 18px 50px rgba(62,58,54,.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #FBF8F3 0%, #F7F4EF 100%);
      line-height: 1.5;
    }
    .wrap { width: min(1240px, calc(100% - 28px)); margin: 24px auto 56px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,251,245,.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    h1 { font-size: clamp(30px, 4vw, 46px); margin: 6px 0 12px; }
    h2 { font-size: 22px; margin-bottom: 14px; }
    .subtitle { color: var(--muted); max-width: 60ch; }
    .form-grid { display: grid; gap: 14px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
    select { width: 100%; border-radius: 14px; border: 1px solid var(--line); background: #FFFCF8; padding: 12px; font-size: 15px; }
    .btn-primary { background: linear-gradient(180deg, var(--accent-2), var(--accent)); border: 0; padding: 12px 24px; font-size: 15px; font-weight: 800; border-radius: 14px; cursor: pointer; }
    .result { margin-top: 20px; padding: 20px; background: #FAF6F0; border-radius: 18px; }
    .mono { font-family: monospace; white-space: pre-wrap; background: #F8F3EC; padding: 16px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>八字 × 衣著增運系統</h1>
      <p class="subtitle">輸入你的出生年月日時，系統可根據你的增運要求建議最適合的衣著配色。</p>
    </div>
    
    <div class="card" style="margin-top: 20px;">
      <h2>輸入資料</h2>
      <div class="form-grid">
        <div>
          <label>曆法</label>
          <select id="calendarType">
            <option value="solar">新曆</option>
            <option value="lunar">農曆</option>
          </select>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
          <div><label>年</label><select id="year"></select></div>
          <div><label>月</label><select id="month"></select></div>
          <div><label>日</label><select id="day"></select></div>
        </div>
        <div>
          <label>輸出模式</label>
          <select id="mode">
            <option value="balanced">基礎平衡</option>
            <option value="wealth">財運</option>
            <option value="relationship">感情</option>
            <option value="mood">情緒</option>
            <option value="health">健康</option>
          </select>
        </div>
        <button class="btn-primary" onclick="analyze()">計算結果</button>
      </div>
    </div>

    <div id="result" class="result" style="display:none;">
      <h2>結果</h2>
      <pre id="output" class="mono"></pre>
    </div>
  </div>

  <script>
    const ELEMENT_MAP = {
      '甲': 'wood', '乙': 'wood', '丙': 'fire', '丁': 'fire', '戊': 'earth', '己': 'earth',
      '庚': 'metal', '辛': 'metal', '壬': 'water', '癸': 'water',
      '子': 'water', '丑': 'earth', '寅': 'wood', '卯': 'wood', '辰': 'earth', '巳': 'fire',
      '午': 'fire', '未': 'earth', '申': 'metal', '酉': 'metal', '戌': 'earth', '亥': 'water'
    };

    const ELEMENT_LABEL = { wood: '木', fire: '火', earth: '土', metal: '金', water: '水' };
    const COLOR_MAP = {
      wood: ['綠', '深綠', '橄欖綠'],
      fire: ['紅', '粉紅', '紫', '酒紅'],
      earth: ['米白', '杏色', '卡其', '啡'],
      metal: ['白', '灰', '銀', '香檳金'],
      water: ['黑', '深藍', '海軍藍']
    };

    // Populate selects
    for (let y = 1950; y <= 2010; y++) document.getElementById('year').add(new Option(y, y));
    for (let m = 1; m <= 12; m++) document.getElementById('month').add(new Option(m, m));
    for (let d = 1; d <= 31; d++) document.getElementById('day').add(new Option(d, d));
    document.getElementById('year').value = 1990;
    document.getElementById('month').value = 1;
    document.getElementById('day').value = 1;

    function calculateLocal(data) {
      // 簡單既 mock response，等你可以係本地 test
      const year = data.year;
      const month = data.month;
      const day = data.day;
      
      // Mock 既八字
      const pillars = [
        String(year).slice(-2) + '子',
        '寅月',
        String(day) + '日',
        '午時'
      ];
      
      const counts = { wood: 2, fire: 2, earth: 2, metal: 1, water: 1 };
      
      return {
        success: true,
        input: data,
        pillars: pillars,
        five_elements_surface: counts,
        day_master: '乙木',
        analysis: { primary_support: 'wood', secondary_support: 'water' },
        note: '呢個係本地mock	response，deploy後會用真正既API'
      };
    }

    async function analyze() {
      const year = parseInt(document.getElementById('year').value);
      const month = parseInt(document.getElementById('month').value);
      const day = parseInt(document.getElementById('day').value);
      const mode = document.getElementById('mode').value;
      const calendarType = document.getElementById('calendarType').value;

      const btn = document.querySelector('.btn-primary');
      btn.textContent = '計算中...';
      btn.disabled = true;

      try {
        // 嘗試 call API
        let data;
        try {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ year, month, day, mode, calendarType })
          });
          data = await res.json();
        } catch (apiErr) {
          // API fail，用本地既 mock
          console.log('API fail, 用本地:', apiErr.message);
          data = calculateLocal({ year, month, day, mode, calendarType });
        }
        
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        document.getElementById('output').textContent = 'Error: ' + err.message;
        document.getElementById('result').style.display = 'block';
      } finally {
        btn.textContent = '計算結果';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
